<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Johannes · Blokk 1 · MMC 2027</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{font-size:16px}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',sans-serif;background:#F0F2F5;color:#0A0A0A;min-height:100vh;padding-bottom:80px}
button{font-family:inherit;cursor:pointer;border:none;background:none;-webkit-appearance:none}

/* HEADER */
.header{background:#1A3560;color:#fff;padding:14px 16px 12px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.header-eyebrow{font-size:10px;opacity:.65;text-transform:uppercase;letter-spacing:.8px;margin-bottom:3px}
.header-title{font-size:18px;font-weight:700;letter-spacing:-.3px}
.header-sub{font-size:11px;opacity:.7;margin-top:2px}

/* TOP NAV (Øktplan / Ernæring) */
.top-nav{display:flex;background:#fff;border-bottom:1px solid #E0E0E8}
.top-nav button{flex:1;padding:13px 0;font-size:13px;font-weight:600;color:#6B6B6B;border-bottom:2px solid transparent;transition:all .15s}
.top-nav button.active{color:#1A3560;border-bottom:2px solid #1A3560}

/* UKE TABS */
.uke-tabs{background:#fff;border-bottom:1px solid #E0E0E8;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.uke-tabs::-webkit-scrollbar{display:none}
.uke-tabs-inner{display:flex;min-width:max-content}
.uke-tab{padding:10px 16px;font-size:12px;font-weight:600;color:#6B6B6B;border-bottom:2px solid transparent;white-space:nowrap;transition:all .15s}
.uke-tab.active{color:#1A3560;border-bottom:2px solid #1A3560}

/* INNER TABS */
.inner-tabs{display:flex;background:#fff;border-bottom:1px solid #E0E0E8}
.inner-tab{flex:1;padding:11px 0;font-size:13px;font-weight:600;color:#6B6B6B;border-bottom:2px solid transparent;transition:all .15s}
.inner-tab.active{color:#1A3560;border-bottom:2px solid #1A3560}

/* CARDS */
.card{background:#fff;border-radius:14px;border:1px solid #E0E0E8;margin:0 14px 10px;overflow:hidden}
.card-header{padding:13px 16px;cursor:pointer;display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.card-body{border-top:1px solid #F0F0F5;padding:14px 16px;display:none}
.card-body.open{display:block}
.section{max-width:480px;margin:0 auto}
.section-inner{padding:10px 0 0}

/* PILLS */
.pills{display:flex;gap:5px;flex-wrap:wrap;margin-top:5px}
.pill{font-size:10px;font-weight:700;padding:2px 7px;border-radius:12px}
.pill-p{background:#1C6B3A22;color:#1C6B3A}
.pill-k{background:#B4530922;color:#B45309}
.pill-f{background:#55555522;color:#555}
.pill-c{background:#1A356022;color:#1A3560}
.pill-warn{background:#F59E0B22;color:#B45309}

/* DAG SELECTOR */
.dag-selector{display:flex;gap:6px;padding:10px 14px 0;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.dag-selector::-webkit-scrollbar{display:none}
.dag-btn{flex-shrink:0;padding:7px 11px;border-radius:9px;border:1.5px solid #E0E0E8;background:#fff;font-size:11px;font-weight:600;text-align:center;line-height:1.3;transition:all .15s;min-width:44px}
.dag-btn.active{color:#fff;border-color:transparent}
.dag-btn-sub{font-size:9px;opacity:.7;margin-top:2px}

/* LØPINFO */
.lop-info{background:#EEF5FF;border:1px solid #BFDBFE;border-radius:11px;padding:11px 14px;margin:8px 14px 0}
.lop-info-title{font-size:11px;font-weight:700;color:#1A3560;margin-bottom:6px}
.lop-stats{display:flex;gap:18px;flex-wrap:wrap;margin-bottom:6px}
.lop-stat-label{font-size:9px;color:#6B6B6B;text-transform:uppercase;letter-spacing:.4px}
.lop-stat-val{font-size:13px;font-weight:700;color:#1A3560}
.lop-note{font-size:11px;color:#2C5AA0;line-height:1.6}

/* UKE OVERVIEW */
.uke-overview{background:#fff;border-radius:14px;border:1px solid #E0E0E8;margin:12px 14px 0;padding:14px 16px}
.uke-overview.deload{background:#FFF8E1;border-color:#F59E0B}
.deload-badge{font-size:10px;font-weight:700;background:#F59E0B;color:#fff;padding:3px 8px;border-radius:20px}
.uke-meta{display:flex;gap:20px;margin-top:10px}
.uke-meta-num{text-align:center}
.uke-meta-label{font-size:9px;color:#6B6B6B;text-transform:uppercase;letter-spacing:.4px}
.uke-meta-val{font-size:20px;font-weight:700;color:#1A3560}

/* DAG HEADER */
.dag-header{border-radius:12px;padding:13px 16px;color:#fff;margin:10px 14px 0}
.dag-macro-row{display:flex;gap:16px;margin-top:5px;flex-wrap:wrap}
.dag-macro-item .label{font-size:9px;opacity:.7;text-transform:uppercase}
.dag-macro-item .val{font-size:16px;font-weight:700}

/* MÅLTID CARDS */
.maltid-card{background:#fff;border-radius:12px;border:1px solid #E0E0E8;margin:0 14px 8px;overflow:hidden}
.maltid-header{padding:13px 16px;cursor:pointer;display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.maltid-chevron{font-size:18px;color:#C0C0C8;flex-shrink:0;transition:transform .2s}
.maltid-body{border-top:1px solid #F0F0F5;padding:14px 16px;display:none}
.maltid-body.open{display:block}

/* INGREDIENSER */
.ing-item{font-size:12px;color:#0A0A0A;padding:4px 0;border-bottom:1px solid #F5F5F7;display:flex;gap:8px}
.ing-dot{color:#1A3560;flex-shrink:0}

/* FREMGANGSMÅTE */
.how-text{font-size:12px;line-height:1.75;color:#0A0A0A;white-space:pre-line}
.tips-item{font-size:12px;color:#2C5AA0;padding:3px 0;display:flex;gap:8px;line-height:1.5}

/* ØVELSE CARDS */
.okt-card{background:#fff;border-radius:12px;border:1px solid #E0E0E8;margin:0 14px 8px;overflow:hidden}
.okt-header{padding:13px 16px;cursor:pointer;display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.okt-body{border-top:1px solid #F0F0F5;padding:0;display:none}
.okt-body.open{display:block}
.ovelse-item{display:flex;gap:12px;padding:11px 16px;border-bottom:1px solid #F0F0F5;align-items:flex-start}
.ovelse-item:last-child{border-bottom:none}
.ovelse-num{width:24px;height:24px;border-radius:6px;background:#1A3560;color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.ovelse-navn{font-size:13px;font-weight:600;color:#0A0A0A;margin-bottom:2px}
.ovelse-detalj{font-size:11px;color:#6B6B6B;line-height:1.5}
.ovelse-hvile{font-size:10px;color:#A0A0A8;margin-top:3px}

/* FREMGANG BAR */
.prog-bar-wrap{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.prog-bar-bg{flex:1;height:14px;background:#F0F0F5;border-radius:4px;overflow:hidden}
.prog-bar-fill{height:100%;border-radius:4px;display:flex;align-items:center;padding-left:6px}
.prog-bar-label{font-size:9px;color:#fff;font-weight:700}
.prog-bar-uke{font-size:10px;font-weight:600;width:38px}
.prog-bar-meta{font-size:10px;color:#6B6B6B;text-align:right;width:60px}

/* HANDLELISTE */
.handel-kategori{background:#fff;border-radius:12px;border:1px solid #E0E0E8;margin:0 14px 10px;overflow:hidden}
.handel-kat-header{background:#F5F5F7;padding:10px 16px;border-bottom:1px solid #E0E0E8}
.handel-kat-title{font-size:13px;font-weight:700}
.handel-item{padding:11px 16px;border-bottom:1px solid #F0F0F5;cursor:pointer;display:flex;gap:12px;align-items:flex-start;transition:background .1s}
.handel-item:last-child{border-bottom:none}
.handel-item.done{background:#F4FBF7}
.handel-checkbox{width:20px;height:20px;border-radius:6px;border:1.5px solid #C0C0C8;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;transition:all .15s}
.handel-checkbox.done{background:#1B8A4C;border:none}
.handel-checkbox-tick{color:#fff;font-size:12px}
.handel-vare{font-size:13px;font-weight:600;transition:all .15s}
.handel-vare.done{color:#6B6B6B;text-decoration:line-through}
.handel-meta{font-size:11px;color:#6B6B6B;margin-top:2px}
.handel-usage{font-size:10px;color:#2C5AA0;margin-top:3px}
.handel-pris{font-size:11px;font-weight:700;color:#1A3560;flex-shrink:0}

/* INFO BOXES */
.info-box{border-radius:11px;padding:11px 14px;margin:8px 14px 0}
.info-box.blue{background:#EEF5FF;border:1px solid #BFDBFE;color:#2C5AA0}
.info-box.orange{background:#FFF8E1;border:1px solid #FDE68A;color:#B45309}
.info-box.green{background:#F0FDF4;border:1px solid #BBF7D0;color:#166534}
.info-box-title{font-size:11px;font-weight:700;margin-bottom:5px;color:inherit}
.info-box-text{font-size:11px;line-height:1.7}

/* TOTALS ROW */
.totals-row{display:flex;justify-content:space-between;background:#F5F5F7;border-radius:10px;padding:12px 14px;margin:10px 14px 0}
.total-item{text-align:center}
.total-label{font-size:9px;color:#6B6B6B;text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px}
.total-val{font-size:18px;font-weight:700}

/* SECTION HEADERS */
.section-label{font-size:10px;font-weight:700;color:#6B6B6B;text-transform:uppercase;letter-spacing:.5px;padding:10px 14px 4px;margin-top:4px}

/* HANDEL SUMMARY */
.handel-summary{background:#fff;border-radius:12px;border:1px solid #E0E0E8;padding:12px 16px;margin:12px 14px 10px;display:flex;justify-content:space-between;align-items:center}
.handel-count{font-size:20px;font-weight:700;color:#1A3560}

/* KRITERIA BOX */
.kriteria-box{background:#EEF5FF;border:1px solid #BFDBFE;border-radius:12px;padding:14px 16px;margin:10px 14px 0}
.kriteria-title{font-size:12px;font-weight:700;color:#1A3560;margin-bottom:8px}
.kriteria-item{display:flex;gap:8px;margin-bottom:5px;font-size:12px;color:#1A3560;line-height:1.5}

/* DARK SPORT BOX */
.sport-box{background:#1A3560;border-radius:12px;padding:14px 16px;margin:0 14px 10px;color:#fff}
.sport-title{font-size:13px;font-weight:700;margin-bottom:10px}
.sport-item{padding:8px 0;border-bottom:1px solid rgba(255,255,255,.15)}
.sport-item:last-child{border-bottom:none}
.sport-item-navn{font-size:12px;font-weight:600}
.sport-item-where{font-size:11px;opacity:.75;margin-top:2px}
.sport-item-pris{font-size:11px;opacity:.85;margin-top:1px}

@media(max-width:400px){
  .header-title{font-size:16px}
  .dag-btn{padding:6px 8px;min-width:40px}
}
</style>
</head>

function setMain(v) {
  mainView = v;
  document.getElementById('view-okter').style.display = v==='okter'?'block':'none';
  document.getElementById('view-mat').style.display = v==='mat'?'block':'none';
  document.getElementById('main-okter').classList.toggle('active',v==='okter');
  document.getElementById('main-mat').classList.toggle('active',v==='mat');
  if(v==='okter') renderOkt();
  else renderMat();
}

function setInner(t) {
  innerTab = t;
  document.getElementById('mat-dagbok').style.display = t==='dagbok'?'block':'none';
  document.getElementById('mat-handel').style.display = t==='handel'?'block':'none';
  document.getElementById('inner-dagbok').classList.toggle('active',t==='dagbok');
  document.getElementById('inner-handel').classList.toggle('active',t==='handel');
  if(t==='dagbok') renderDagbok();
  else renderHandel();
}

function toggle(id) {
  const el = document.getElementById(id);
  if(el) el.classList.toggle('open');
}

function toggleHandel(key) {
  checked[key] = !checked[key];
  const item = document.getElementById('hi-'+key);
  const cb = document.getElementById('hcb-'+key);
  const vare = document.getElementById('hv-'+key);
  if(item) item.classList.toggle('done', checked[key]);
  if(cb) cb.classList.toggle('done', checked[key]);
  if(vare) vare.classList.toggle('done', checked[key]);
  updateHandelCount();
}

function updateHandelCount() {
  const total = Object.keys(checked).filter(k=>k.startsWith('h-')).reduce((s,k)=>s+(checked[k]?1:0),0);
  const allItems = document.querySelectorAll('[id^="hi-h-"]').length;
  const el = document.getElementById('handel-count');
  if(el) el.textContent = total+'/'+allItems;
}

function renderOkt() {
  const tabs = document.getElementById('okt-uke-tabs');
  tabs.innerHTML = UKER_OKT.map((u,i) =>
    `<button class="uke-tab${i===oktUke?' active':''}" onclick="setOktUke(${i})">${u.deload?'⟳ ':''}Uke ${u.num}</button>`
  ).join('');
  renderOktContent();
}

function setOktUke(i) {
  oktUke = i;
  document.querySelectorAll('.uke-tab').forEach((t,idx)=>{
    if(t.closest('#okt-uke-tabs')) t.classList.toggle('active',idx===i);
  });
  renderOktContent();
}

  <div style="background:#fff;border-radius:12px;border:1px solid #E0E0E8;margin:0 14px;padding:14px 16px">`;
  [{u:"Uke 1",km:38,lt:"28 km",b:38,dl:false},{u:"Uke 2",km:42,lt:"28–30 km",b:42,dl:false},
   {u:"Uke 3",km:48,lt:"30–32 km",b:48,dl:false},{u:"Uke 4",km:28,lt:"18–20 km",b:28,dl:true},
   {u:"Uke 5",km:52,lt:"32–34 km",b:52,dl:false},{u:"Uke 6",km:56,lt:"34–36 km",b:56,dl:false}
  ].forEach(r=>{
    html+=`<div class="prog-bar-wrap">
      <div class="prog-bar-uke" style="color:${r.dl?'#D97706':'#6B6B6B'}">${r.u}</div>
      <div class="prog-bar-bg"><div class="prog-bar-fill" style="width:${(r.b/60)*100}%;background:${r.dl?'#F59E0B':'#1A3560'}">
        <span class="prog-bar-label">${r.km}</span></div></div>
      <div class="prog-bar-meta">${r.lt}</div>
    </div>`;
  });
  html += `</div>`;

  // Kriterier
  html += `<div class="section-label">Kriterier for overgang til Blokk 2</div>
  <div class="kriteria-box">
    <div class="kriteria-title">Alle disse må være oppfylt:</div>`;
  ["Løpsvolum 50–56 km/uke uten skadeproblemer","Langtur 34–36 km i terreng gjennomført","Terskelintervall 4×8 min fullført","Heel elevated squat smertefritt og progressivt","Alle styrkeløftevekter logget som baseline","Ingen vedvarende ømhet i knær, hofter eller akillessener"].forEach(k=>{
    html+=`<div class="kriteria-item"><span>✓</span><span>${k}</span></div>`;
  });
  html+=`</div><div style="height:20px"></div>`;

  document.getElementById('okt-content').innerHTML = html;
}

// ============================================================
// RENDER ERNÆRING
// ============================================================
function renderMat() {
  const tabs = document.getElementById('mat-uke-tabs');
  tabs.innerHTML = UKER_MAT.map((u,i) =>
    `<button class="uke-tab${i===matUke?' active':''}" onclick="setMatUke(${i})">${u.deload?'⟳ ':''}Uke ${u.num}</button>`
  ).join('');
  if(innerTab==='dagbok') renderDagbok();
  else renderHandel();
}

function setMatUke(i) {
  matUke=i; matDag=0;
  document.querySelectorAll('.uke-tab').forEach((t,idx)=>{
    if(t.closest('#mat-uke-tabs')) t.classList.toggle('active',idx===i);
  });
  if(innerTab==='dagbok') renderDagbok();
  else renderHandel();
}

function setMatDag(i) {
  matDag=i;
  renderDagbok();
}

function renderDagbok() {
  const U = UKER_MAT[matUke];
  const D = U.dager[matDag];
  const meals = [['fr','Frokost','07:00'],['lu','Lunsj','12:30'],['mi','Middag','18:00'],['sn','Snack','21:30']];
  const totalP = meals.reduce((s,[k])=>s+(R[D.m[k]]?.p||0),0);
  const totalK = meals.reduce((s,[k])=>s+(R[D.m[k]]?.k||0),0);
  const totalF = meals.reduce((s,[k])=>s+(R[D.m[k]]?.f||0),0);
  const totalC = meals.reduce((s,[k])=>s+(R[D.m[k]]?.kcal||0),0);
  const color = TC[D.type]||'#555';

  let html = '';
  // Uke overview
  html+=`<div class="uke-overview${U.deload?' deload':''}">
    <div style="display:flex;justify-content:space-between;align-items:flex-start">
      <div>
        <div style="font-size:15px;font-weight:700;color:${U.deload?'#B45309':'#0A0A0A'};margin-bottom:2px">${U.tittel}</div>
      </div>
      ${U.deload?'<span class="deload-badge">DELOAD</span>':''}
    </div>
  </div>`;

  // Dag selector
  html+=`<div class="dag-selector">`;
  U.dager.forEach((d,i)=>{
    const c = TC[d.type]||'#555';
    html+=`<button class="dag-btn${i===matDag?' active':''}" onclick="setMatDag(${i})" style="${i===matDag?`background:${c};border-color:${c};color:#fff`:''}">${d.dag}<div class="dag-btn-sub">${TL[d.type]?.slice(0,5)||''}</div></button>`;
  });
  html+=`</div>`;

  // Dag header
  html+=`<div class="dag-header" style="background:${color}">
    <div style="font-size:12px;opacity:.8">${D.dag} · ${TL[D.type]||''}</div>
    <div class="dag-macro-row">
      <div class="dag-macro-item"><div class="label">Kcal</div><div class="val">${totalC}</div></div>
      <div class="dag-macro-item"><div class="label">Protein</div><div class="val">${totalP}g</div></div>
      <div class="dag-macro-item"><div class="label">Karbo</div><div class="val">${totalK}g</div></div>
      <div class="dag-macro-item"><div class="label">Fett</div><div class="val">${totalF}g</div></div>
    </div>
  </div>`;

  // Løpinfo
  if(D.lop){
    html+=`<div class="lop-info">
      <div class="lop-info-title">🏃 Løpøkt denne dagen</div>
      <div class="lop-stats">
        <div><div class="lop-stat-label">Tid</div><div class="lop-stat-val">${D.lop.tid}</div></div>
        <div><div class="lop-stat-label">Km</div><div class="lop-stat-val">${D.lop.km}</div></div>
        <div><div class="lop-stat-label">Puls</div><div class="lop-stat-val">${D.lop.puls}</div></div>
      </div>
      <div class="lop-note">${D.lop.noter}</div>
    </div>`;
  }

  // Meals
  meals.forEach(([key,label,tid])=>{
    const rk = D.m[key];
    const rec = R[rk];
    if(!rec) return;
    const mid = `m-${matUke}-${matDag}-${key}`;
    html+=`<div class="maltid-card">
      <div class="maltid-header" onclick="toggleMaltid('${mid}')">
        <div style="flex:1">
          <div style="font-size:10px;font-weight:700;color:#6B6B6B;text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px">${label} · ${tid}</div>
          <div style="font-size:15px;font-weight:700;margin-bottom:5px">${rec.e} ${rec.navn}</div>
          <div class="pills">
            <span class="pill pill-p">P:${rec.p}g</span>
            <span class="pill pill-k">K:${rec.k}g</span>
            <span class="pill pill-f">F:${rec.f}g</span>
            <span class="pill pill-c">${rec.kcal} kcal</span>
            <span style="font-size:10px;color:#A0A0A8">⏱ ${rec.tid}</span>
          </div>
        </div>
        <span class="maltid-chevron">↓</span>
      </div>
      <div id="${mid}" class="maltid-body">
        <div style="font-size:11px;font-weight:700;color:#6B6B6B;text-transform:uppercase;letter-spacing:.4px;margin-bottom:8px">Ingredienser</div>
        ${rec.ing.map(i=>`<div class="ing-item"><span class="ing-dot">·</span>${i}</div>`).join('')}
        <div style="font-size:11px;font-weight:700;color:#6B6B6B;text-transform:uppercase;letter-spacing:.4px;margin:14px 0 8px">Fremgangsmåte</div>
        <div class="how-text">${rec.how}</div>
        ${rec.tips&&rec.tips.length?`
        <div style="font-size:11px;font-weight:700;color:#6B6B6B;text-transform:uppercase;letter-spacing:.4px;margin:12px 0 6px">🎨 Kreative tips</div>
        ${rec.tips.map(t=>`<div class="tips-item"><span>💡</span>${t}</div>`).join('')}`:''}
      </div>
    </div>`;
  });

  html+=`<div style="height:20px"></div>`;
  document.getElementById('mat-dagbok').innerHTML = html;
}

function toggleMaltid(id) {
  const el = document.getElementById(id);
  const chevron = el?.previousElementSibling?.querySelector('.maltid-chevron');
  if(el) { el.classList.toggle('open'); if(chevron) chevron.textContent = el.classList.contains('open')?'↑':'↓'; }
}

// ============================================================
// RENDER HANDLELISTE
// ============================================================
function renderHandel() {
  const kats = [
    {k:"🥩 Proteiner",d:HANDEL.proteiner},
    {k:"🥚 Meieri & Egg",d:HANDEL.meieri},
    {k:"🍌 Frukt & Grønt",d:HANDEL.frukt},
    {k:"❄️ Frysevarer",d:HANDEL.frysevarer},
    {k:"🌾 Tørrprodukter",d:HANDEL.tørrvarer},
    {k:"🫙 Krydder & Sauser",d:HANDEL.krydder},
  ];
  const totalItems = kats.reduce((s,k)=>s+k.d.length,0) + HANDEL.sport.length;
  const totalDone = Object.keys(checked).filter(k=>k.startsWith('h-')&&checked[k]).length;

  let html=`
  <div class="handel-summary">
    <div>
      <div style="font-size:14px;font-weight:700">Handleliste · Uke ${UKER_MAT[matUke].num}</div>
      <div style="font-size:11px;color:#6B6B6B;margin-top:2px">Kiwi + Coop Mega · Est. 900–1400 kr</div>
    </div>
    <div style="text-align:center">
      <div id="handel-count" class="handel-count">${totalDone}/${totalItems}</div>
      <div style="font-size:9px;color:#6B6B6B;text-transform:uppercase">Handlet</div>
    </div>
  </div>
  <div class="info-box blue">
    <div class="info-box-title">Tips før du handler</div>
    <div class="info-box-text">• Geler, whey og salttabletter bestilles på nett (billigere)<br>• Kjøtt og fisk på tilbud kan fryses ned<br>• Mealprep søndag sparer tid hele uka<br>• Kiwi-merke på basisvarer er billigst<br>• Ta med det som er igjen fra forrige uke</div>
  </div>`;

  kats.forEach(({k,d})=>{
    html+=`<div class="handel-kategori"><div class="handel-kat-header"><div class="handel-kat-title">${k}</div></div>`;
    d.forEach((v,i)=>{
      const key=`h-${k.replace(/[^a-z0-9]/gi,'')}${i}`;
      const done=checked[key]||false;
      html+=`<div id="hi-${key}" class="handel-item${done?' done':''}" onclick="toggleHandel('${key}')">
        <div id="hcb-${key}" class="handel-checkbox${done?' done':''}">
          ${done?'<span class="handel-checkbox-tick">✓</span>':''}
        </div>
        <div style="flex:1">
          <div style="display:flex;justify-content:space-between;align-items:flex-start">
            <div id="hv-${key}" class="handel-vare${done?' done':''}">${v.v}</div>
            ${v.pr?`<div class="handel-pris">${v.pr}</div>`:''}
          </div>
          <div class="handel-meta">${v.m} · ${v.p}</div>
          ${v.t?`<div class="handel-usage">→ ${v.t}</div>`:''}
        </div>
      </div>`;
    });
    html+=`</div>`;
  });

  // Sport
  html+=`<div class="sport-box"><div class="sport-title">💪 Bestill på nett — ikke i vanlig butikk</div>`;
  HANDEL.sport.forEach(v=>{
    const key=`h-sport${v.v.replace(/[^a-z0-9]/gi,'')}`;
    html+=`<div class="sport-item">
      <div class="sport-item-navn">${v.v}</div>
      <div class="sport-item-where">${v.p}</div>
      <div class="sport-item-pris">${v.pr} · → ${v.t}</div>
    </div>`;
  });
  html+=`</div><div style="height:20px"></div>`;
  document.getElementById('mat-handel').innerHTML=html;
}
